version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentrix_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentrix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentrix_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sentrix_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentrix} -d ${POSTGRES_DB:-sentrix_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentrix_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sentrix_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: sentrix_backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${POSTGRES_USER:-sentrix}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentrix_pass}
      - POSTGRES_DB=${POSTGRES_DB:-sentrix_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
